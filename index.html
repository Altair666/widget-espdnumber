<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Номера — ЕСПД</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f7;--surf:#FFF;--surf2:#f7f7f7;--surf3:#e5e5e5;
  --brd:#DEDAD2;--brd2:#C4C0B6;
  --tx:#18170F;--tx2:#6A6860;--tx3:#9E9C94;
  --acc:#1E4ED8;--acc-bg:#EEF2FF;--acc-brd:#C7D2FE;
  --grn:#0D6E4E;--grn-bg:#ECFDF5;--grn-brd:#A7F3D0;
  --warn:#92400E;--warn-bg:#FFFBEB;--warn-brd:#FCD34D;
  --red:#991B1B;--red-bg:#FEF2F2;--red-brd:#FECACA;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
  --r:4pt;
}
html,body{height:100%;overflow:hidden;font-family:var(--sans);font-size:13px;color:var(--tx);background:var(--bg)}
.app{height:100vh;overflow:hidden;display:flex;flex-direction:column}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
.conn-dot.ok{background:var(--grn)}
.conn-lbl{font-size:11px;color:var(--tx3)}
.conn-status{position:fixed;left:10px;bottom:6px;display:flex;align-items:center;gap:6px;font-size:10px;color:var(--tx3);background:var(--surf2);border:1px solid var(--brd);border-radius:4pt;padding:1px 7px;z-index:10}
.ver-footer{position:fixed;right:10px;bottom:6px;font-family:var(--mono);font-size:10px;color:var(--tx3);background:var(--surf2);border:1px solid var(--brd);border-radius:4pt;padding:1px 7px;z-index:10}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:0}

/* ── PANELS ── */
.panel{background:var(--surf);border:1px solid var(--brd);border-radius:0;overflow:hidden}
.panel+.panel{border-top:none}
.ph{display:flex;align-items:center;justify-content:space-between;height:32px;padding:0 12px;border-bottom:1px solid var(--brd);background:var(--surf2)}
.ph-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2)}
.pb{padding:12px 14px}

/* ── FORM ── */
.form-row{display:grid;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx2)}
.form-hint{font-size:10px;color:var(--tx3);min-height:14px}
.form-input{height:32px;border:1px solid var(--brd);border-radius:var(--r);background:#f7f7f7;padding:0 9px;font-family:inherit;font-size:12px;color:var(--tx);outline:none;transition:border-color .15s,background .15s;width:100%}
.form-input:focus{border-color:var(--acc);background:var(--surf)}
.form-input[readonly]{background:var(--surf3);color:var(--tx2);cursor:default}
.form-input[readonly]:focus{border-color:var(--brd)}
.form-input::placeholder{color:var(--tx3)}
.form-input.mono{font-family:var(--mono)}
.form-input.optional-empty{border-style:dashed;background:var(--surf)}
.opt-badge{font-size:9px;color:var(--tx3);font-weight:400;text-transform:none;letter-spacing:0;margin-left:4px}

/* autocomplete */
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:34px;left:0;right:0;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);z-index:100;max-height:180px;overflow-y:auto;display:none;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.ac-drop.on{display:block}
.ac-item{padding:6px 9px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:7px}
.ac-item:hover,.ac-item.hov{background:var(--acc-bg)}
.ac-code{font-family:var(--mono);font-size:10px;color:var(--acc);flex-shrink:0}
.ac-name{font-size:11px;color:var(--tx);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* preview number */
.preview-number{font-family:var(--mono);font-size:20px;font-weight:500;background:var(--grn-bg);border:1px solid var(--grn-brd);border-radius:var(--r);padding:10px 14px;color:var(--grn);margin-bottom:10px;letter-spacing:.04em;min-height:44px;display:flex;align-items:center}
.preview-number.empty{background:var(--surf3);border-color:var(--brd);color:var(--tx3)}

/* register button */
.btn-add{display:flex;align-items:center;justify-content:center;gap:6px;background:#16b378;color:#fff;border:none;border-radius:var(--r);padding:9px 16px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;width:100%;margin-top:4px}
.btn-add:hover{opacity:.88}
.btn-add:active{transform:scale(.98)}
.btn-add:disabled{opacity:.35;cursor:not-allowed}

/* divider inside form */
.form-divider{height:1px;background:var(--brd);margin:10px 0}
.optional-label{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}

/* ── REGISTERED TABLE ── */
.reg-table{width:100%;border-collapse:collapse;font-size:12px}
.reg-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);padding:5px 8px;border-bottom:2px solid var(--brd);text-align:center;background:var(--surf2)}
.reg-table th.group-header{border-bottom:2px solid var(--brd2);padding-bottom:2px;text-align:center}
.reg-table .sub-header th{font-size:10px;color:var(--tx3);font-weight:500;padding:3px 8px;border-bottom:1px solid var(--brd);background:var(--surf2);text-align:center;white-space:nowrap}
.reg-table td{padding:6px 8px;border-bottom:1px solid var(--brd);vertical-align:top;text-align:center}
.reg-table tr:last-child td{border-bottom:none}
.reg-table tr:hover td{background:var(--surf2)}
.reg-table td.reg-dn{vertical-align:middle}
.reg-dn{font-family:var(--mono);font-size:11px;color:var(--acc);white-space:nowrap}
.reg-name{font-size:12px;color:var(--tx)}
.reg-use-dn{font-family:var(--mono);font-size:11px;color:var(--tx3)}
.reg-use-name{font-size:12px;color:var(--tx2)}
.reg-empty{padding:16px;text-align:center;color:var(--tx3);font-size:12px}
.reg-filter-bar{padding:8px 12px;background:var(--surf2);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:8px}
.reg-filter-input{flex:1;height:28px;border:1px solid var(--brd);border-radius:var(--r);padding:0 9px 0 28px;font-family:inherit;font-size:12px;background:#fff;outline:none;color:var(--tx)}
.reg-filter-input:focus{border-color:var(--acc)}
.reg-filter-wrap{position:relative;flex:1}
.reg-filter-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}

/* inline edit */
.cell-content{display:flex;align-items:center;justify-content:center;gap:6px;min-height:18px;line-height:1.4}
.cell-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.cell-text.reg-use-dn{font-family:var(--mono);font-size:11px;color:var(--acc)}
.cell-text.reg-use-name{font-size:12px;color:var(--tx2)}
.cell-edit-btn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border:1px solid transparent;border-radius:4pt;background:transparent;color:#E07B1F;cursor:pointer;flex-shrink:0;transition:all .1s;padding:0}
.cell-edit-btn:hover{background:#FFF4E6;color:#C5651A;border-color:#F5D4A0}
.cell-edit-btn.save{color:var(--grn)}
.cell-edit-btn.save:hover{background:var(--grn-bg);color:var(--grn);border-color:var(--grn-brd)}
.cell-edit-btn.save:disabled{opacity:.3;cursor:not-allowed;background:transparent;border-color:transparent}
.cell-edit-btn.cancel{color:var(--red)}
.cell-edit-btn.cancel:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-brd)}
.cell-edit-input{flex:1;height:22px;border:1px solid var(--acc);border-radius:4pt;padding:0 6px;font-family:inherit;font-size:12px;color:var(--tx);outline:none;background:var(--surf);min-width:0;text-align:center}
.cell-edit-input.mono{font-family:var(--mono);font-size:11px;color:var(--acc)}
.cell-edit-wrap{position:relative;flex:1;min-width:0}
.cell-edit-drop{position:absolute;top:24px;left:0;right:0;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);z-index:200;max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12);text-align:left;display:none}
.cell-edit-drop.on{display:block}
.cell-edit-drop.up{top:auto;bottom:24px;box-shadow:0 -4px 12px rgba(0,0,0,.12)}
.reg-table td.editable-cell{padding:4px 8px;vertical-align:middle}
.avatar{display:inline-flex;align-items:center;justify-content:center;width:26px;height:22px;border-radius:4pt;color:#fff;font-size:11px;font-weight:600;font-family:inherit;cursor:default;position:relative;user-select:none;margin:0 auto}
.reg-author{padding:6px 8px;text-align:center}
.tag{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:4pt}
.tag-blue{background:var(--acc-bg);color:var(--acc)}

/* tooltip */
#gTooltip{position:fixed;background:var(--tx);color:#fff;padding:6px 10px;border-radius:var(--r);font-size:11px;font-weight:400;white-space:pre;z-index:9999;pointer-events:none;display:none;box-shadow:0 4px 12px rgba(0,0,0,.15);line-height:1.4}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:4pt}
</style>
</head>
<body>
<div class="app">
<main class="main" id="main">

  <!-- REGISTRATION FORM -->
  <div class="panel">
    <div class="ph">
      <span class="ph-title">Регистрация номера ЕСПД</span>
    </div>
    <div class="pb">

      <!-- Row 1: country | org | serial | edition -->
      <div class="form-row" style="grid-template-columns:90px 110px 1fr 80px">
        <!-- Country -->
        <div class="form-group">
          <label class="form-label">Код страны</label>
          <input class="form-input mono" id="countryInput" list="countryList" value="RU"
                 placeholder="RU" oninput="onCountryOrOrgChange()" autocomplete="off">
          <datalist id="countryList">
            <option value="RU">
            <option value="EU">
            <option value="CN">
          </datalist>
        </div>
        <!-- Org prefix -->
        <div class="form-group">
          <label class="form-label">Орг. префикс</label>
          <input class="form-input mono" id="orgInput" list="orgList" value="ЛМАП"
                 placeholder="ЛМАП" oninput="onCountryOrOrgChange()" autocomplete="off">
          <datalist id="orgList">
            <option value="ЛМАП">
            <option value="ТСЕМ">
            <option value="ЭЛМАП">
          </datalist>
        </div>
        <!-- Serial -->
        <div class="form-group">
          <label class="form-label">Рег. номер</label>
          <input class="form-input mono" id="serialInput" placeholder="00001"
                 oninput="onSerialChange()" autocomplete="off" maxlength="5">
          <span class="form-hint" id="serialHint"></span>
        </div>
        <!-- Edition -->
        <div class="form-group">
          <label class="form-label">Издание</label>
          <input class="form-input mono" id="editionDisplay" readonly placeholder="01">
        </div>
      </div>

      <!-- Divider: optional section -->
      <div class="form-divider"></div>
      <div class="optional-label">Дополнительные поля (необязательно)</div>

      <!-- Row 2: doc type | doc num | part num -->
      <div class="form-row" style="grid-template-columns:1fr 80px 70px">
        <!-- Doc type -->
        <div class="form-group">
          <label class="form-label">Код вида документа <span class="opt-badge">(из классификатора)</span></label>
          <div class="ac-wrap">
            <input class="form-input mono optional-empty" id="docTypeInput"
                   placeholder="— не выбрано —"
                   oninput="onDocTypeInput()" onkeydown="onDocTypeKey(event)"
                   autocomplete="off">
            <div class="ac-drop" id="docTypeDrop"></div>
          </div>
          <span class="form-hint" id="docTypeHint"></span>
        </div>
        <!-- Doc num -->
        <div class="form-group">
          <label class="form-label">№ документа</label>
          <input class="form-input mono" id="docNumDisplay" readonly placeholder="—">
        </div>
        <!-- Part num -->
        <div class="form-group">
          <label class="form-label">№ части</label>
          <input class="form-input mono" id="partNumDisplay" readonly placeholder="—">
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- Preview number -->
      <div class="preview-number empty" id="previewNumber">—</div>

      <!-- Name -->
      <div class="form-group" style="margin-bottom:10px">
        <label class="form-label">Наименование документа <span style="color:var(--red)">*</span></label>
        <input class="form-input" id="nameInput"
               placeholder="Программа технологическая для испытаний в камере тепла и холода"
               oninput="updatePreview()">
      </div>

      <!-- Primary use -->
      <div class="form-group" style="margin-bottom:10px">
        <label class="form-label">Первичное применение <span style="color:var(--tx3);font-weight:400;text-transform:none;letter-spacing:0">(необязательно)</span></label>
        <div class="ac-wrap">
          <input class="form-input" id="useInput" placeholder="Поиск по номеру или наименованию…"
                 autocomplete="off" oninput="onUseInput()" onkeydown="onUseKey(event)">
          <div class="ac-drop" id="useDrop"></div>
        </div>
        <span class="form-hint" id="useHint">Не выбрано</span>
      </div>

      <button class="btn-add" id="btnAdd" disabled onclick="addComponent()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Зарегистрировать номер
      </button>

    </div>
  </div>

  <!-- REGISTERED COMPONENTS -->
  <div class="panel" id="pRegistered">
    <div class="ph">
      <span class="ph-title">Зарегистрированные компоненты</span>
      <span class="tag tag-blue" id="regCount"></span>
    </div>
    <div class="reg-filter-bar">
      <div class="reg-filter-wrap">
        <svg class="reg-filter-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="reg-filter-input" id="regFilterInput" placeholder="Фильтр по номеру или наименованию…" oninput="renderRegistered()">
      </div>
    </div>
    <div id="regBody"></div>
  </div>

</main>
</div>

<div class="conn-status">
  <div class="conn-dot" id="connDot"></div>
  <span class="conn-lbl" id="connLbl">Ожидание Grist…</span>
</div>
<footer class="ver-footer">v0.1.0</footer>
<div id="gTooltip"></div>

<script>
/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
const S = {
  components: [],       // espd_components records
  classifier: [],       // espd_classifier records (doc type codes)
  masterComponents: [], // Components records (для "Первичное применение")
  selUse: null,         // {id, decimal_number, name}
  selDocType: null,     // {id, code, name} из espd_classifier
  docTypeAcIdx: -1,
  useAcIdx: -1,
  editing: null,        // { rowId, mode: 'ref'|'compName'|'useName', selUse }
};

/* ═══════════════════════════════════
   GRIST
═══════════════════════════════════ */
let firstLoadDone = false;

function initGrist() {
  if (typeof grist === 'undefined') {
    setConn(false, 'Grist API не найден');
    renderRegistered();
    return;
  }
  grist.ready({ requiredAccess: 'full' });
  setConn(true, 'Загрузка…');

  grist.onRecords(() => { if (firstLoadDone) loadComponents(); });

  Promise.all([
    loadComponents(),
    loadClassifier(),
    loadMasterComponents(),
  ]).then(() => { firstLoadDone = true; });
}

async function loadComponents() {
  if (typeof grist === 'undefined') return;
  try {
    const rows = await grist.docApi.fetchTable('espd_components');
    S.components = rowsToRecords(rows);
    refreshOrgList();
    firstLoadDone = true;
    setConn(true, `${S.components.length} компонентов`);
    updatePreview();
    renderRegistered();
  } catch(e) {
    console.error('Ошибка загрузки espd_components:', e);
    setConn(false, 'Таблица espd_components не найдена');
  }
}

async function loadClassifier() {
  if (typeof grist === 'undefined') return;
  try {
    const rows = await grist.docApi.fetchTable('espd_classifier');
    S.classifier = rowsToRecords(rows);
    S.classifier.sort((a,b) => String(a.code||'').localeCompare(String(b.code||''), undefined, {numeric:true}));
    console.log(`[espd_classifier] ${S.classifier.length} записей`);
  } catch(e) {
    console.warn('espd_classifier не найдена (необязательно):', e.message);
  }
}

async function loadMasterComponents() {
  if (typeof grist === 'undefined') return;
  try {
    const rows = await grist.docApi.fetchTable('Components');
    S.masterComponents = rowsToRecords(rows);
    console.log(`[Components] ${S.masterComponents.length} записей`);
  } catch(e) {
    console.warn('Components не найдена:', e.message);
  }
}

function rowsToRecords(rows) {
  if (!rows || !rows.id) return [];
  return rows.id.map((id, i) => {
    const rec = { id };
    Object.keys(rows).forEach(k => { if (k !== 'id') rec[k] = rows[k][i]; });
    return rec;
  });
}

function setConn(ok, lbl) {
  document.getElementById('connDot').className = 'conn-dot' + (ok ? ' ok' : '');
  document.getElementById('connLbl').textContent = lbl;
}

/* ═══════════════════════════════════
   COUNTERS
═══════════════════════════════════ */
function nextFreeSerial(country, org) {
  const used = new Set(
    S.components
      .filter(c => (c.country_prefix||'') === country && (c.org_prefix||'') === org)
      .map(c => String(c.serial||'').padStart(5,'0'))
  );
  for (let i = 1; i <= 99999; i++) {
    const s = String(i).padStart(5,'0');
    if (!used.has(s)) return s;
  }
  return null;
}

function computeEdition(country, org, serial) {
  const editions = S.components
    .filter(c =>
      (c.country_prefix||'') === country &&
      (c.org_prefix||'') === org &&
      String(c.serial||'').padStart(5,'0') === serial
    )
    .map(c => parseInt(c.edition||'0', 10))
    .filter(n => !isNaN(n) && n > 0);
  const max = editions.length ? Math.max(...editions) : 0;
  return String(max + 1).padStart(2,'0');
}

function computeDocNum(country, org, serial, edition, docTypeCode) {
  if (!docTypeCode) return null;
  const used = new Set(
    S.components
      .filter(c =>
        (c.country_prefix||'') === country &&
        (c.org_prefix||'') === org &&
        String(c.serial||'').padStart(5,'0') === serial &&
        String(c.edition||'').padStart(2,'0') === edition &&
        (c.doc_type_code||'') === docTypeCode
      )
      .map(c => String(c.doc_num||'').padStart(2,'0'))
      .filter(s => s !== '00')
  );
  for (let i = 1; i <= 99; i++) {
    const s = String(i).padStart(2,'0');
    if (!used.has(s)) return s;
  }
  return null;
}

function computePartNum(country, org, serial, edition, docTypeCode, docNum) {
  if (!docTypeCode || !docNum) return null;
  const used = new Set(
    S.components
      .filter(c =>
        (c.country_prefix||'') === country &&
        (c.org_prefix||'') === org &&
        String(c.serial||'').padStart(5,'0') === serial &&
        String(c.edition||'').padStart(2,'0') === edition &&
        (c.doc_type_code||'') === docTypeCode &&
        String(c.doc_num||'').padStart(2,'0') === docNum
      )
      .map(c => String(c.part_num||''))
      .filter(s => s && s !== '0')
  );
  for (let i = 1; i <= 9; i++) {
    const s = String(i);
    if (!used.has(s)) return s;
  }
  return null;
}

function buildNumber(country, org, serial, edition, docTypeCode, docNum, partNum) {
  if (!country || !org || !serial || !edition) return null;
  let n = `${country}.${org}.${serial}-${edition}`;
  if (docTypeCode) {
    n += `-${docTypeCode}`;
    if (docNum) {
      n += `-${docNum}`;
      if (partNum) n += `-${partNum}`;
    }
  }
  return n;
}

/* ═══════════════════════════════════
   FORM EVENTS
═══════════════════════════════════ */
function onCountryOrOrgChange() {
  const country = countryVal();
  const org = orgVal();
  if (country && org) {
    const serial = nextFreeSerial(country, org);
    document.getElementById('serialInput').value = serial || '';
  }
  onSerialChange();
}

function onSerialChange() {
  updatePreview();
}

function countryVal() { return (document.getElementById('countryInput').value||'').trim().toUpperCase(); }
function orgVal() { return (document.getElementById('orgInput').value||'').trim().replace(/\.+$/,''); }
function serialVal() {
  const v = (document.getElementById('serialInput').value||'').trim();
  return v ? v.padStart(5,'0') : '';
}

function refreshOrgList() {
  const used = new Set(['ЛМАП','ТСЕМ','ЭЛМАП']);
  S.components.forEach(c => { if (c.org_prefix) used.add(String(c.org_prefix).trim()); });
  const dl = document.getElementById('orgList');
  if (dl) dl.innerHTML = Array.from(used).sort().map(p => `<option value="${esc(p)}">`).join('');
}

/* ═══════════════════════════════════
   PREVIEW
═══════════════════════════════════ */
function updatePreview() {
  const country = countryVal();
  const org = orgVal();
  const serial = serialVal();
  const nameVal = (document.getElementById('nameInput').value||'').trim();

  const previewEl = document.getElementById('previewNumber');
  const btnAdd = document.getElementById('btnAdd');
  const serialHint = document.getElementById('serialHint');
  const editionEl = document.getElementById('editionDisplay');
  const docNumEl = document.getElementById('docNumDisplay');
  const partNumEl = document.getElementById('partNumDisplay');

  if (!country || !org || !serial) {
    previewEl.textContent = '—';
    previewEl.className = 'preview-number empty';
    editionEl.value = '';
    docNumEl.value = '';
    partNumEl.value = '';
    btnAdd.disabled = true;
    serialHint.textContent = '';
    return;
  }

  const edition = computeEdition(country, org, serial);
  editionEl.value = edition;

  // Check if serial already exists (new edition case)
  const existingCount = S.components.filter(c =>
    (c.country_prefix||'') === country &&
    (c.org_prefix||'') === org &&
    String(c.serial||'').padStart(5,'0') === serial
  ).length;
  serialHint.textContent = existingCount
    ? `Существует ${existingCount} зап., будет издание ${edition}`
    : 'Новый рег. номер, издание 01';

  // Optional doc fields
  const docTypeCode = S.selDocType ? S.selDocType.code : '';
  const docNum = computeDocNum(country, org, serial, edition, docTypeCode);
  const partNum = docNum ? computePartNum(country, org, serial, edition, docTypeCode, docNum) : null;

  docNumEl.value = docTypeCode && docNum ? docNum : '';
  partNumEl.value = docTypeCode && docNum && partNum ? partNum : '';

  const formed = buildNumber(country, org, serial, edition, docTypeCode,
    docTypeCode ? docNum : null,
    docTypeCode && docNum ? partNum : null);

  if (formed) {
    previewEl.textContent = formed;
    previewEl.className = 'preview-number';
    btnAdd.disabled = !nameVal;
  } else {
    previewEl.textContent = '—';
    previewEl.className = 'preview-number empty';
    btnAdd.disabled = true;
  }
}

/* ═══════════════════════════════════
   ADD COMPONENT
═══════════════════════════════════ */
async function addComponent() {
  const country = countryVal();
  const org = orgVal();
  const serial = serialVal();
  const name = (document.getElementById('nameInput').value||'').trim();
  if (!country || !org || !serial || !name) return;

  const edition = computeEdition(country, org, serial);
  const docTypeCode = S.selDocType ? S.selDocType.code : '';
  const docNum = computeDocNum(country, org, serial, edition, docTypeCode);
  const partNum = docNum ? computePartNum(country, org, serial, edition, docTypeCode, docNum) : null;

  const espd_number = buildNumber(country, org, serial, edition,
    docTypeCode,
    docTypeCode ? docNum : null,
    docTypeCode && docNum ? partNum : null);
  if (!espd_number) return;

  const btn = document.getElementById('btnAdd');
  btn.disabled = true;
  btn.textContent = 'Сохранение…';

  const fields = {
    country_prefix: country,
    org_prefix: org,
    serial: serial,
    edition: edition,
    espd_number: espd_number,
    name: name,
  };
  if (docTypeCode) fields.doc_type_code = docTypeCode;
  if (docTypeCode && docNum) fields.doc_num = docNum;
  if (docTypeCode && docNum && partNum) fields.part_num = partNum;
  if (S.selUse) fields.primary_use = S.selUse.id;

  // Optimistic add
  const tempId = -Date.now();
  const optimistic = { id: tempId, espd_number, name, country_prefix: country, org_prefix: org,
    serial, edition, doc_type_code: docTypeCode, doc_num: docNum||'', part_num: partNum||'',
    primary_use: S.selUse ? S.selUse.id : 0 };
  S.components.push(optimistic);
  renderRegistered();

  try {
    if (typeof grist !== 'undefined') {
      await grist.selectedTable.create({ fields });
      loadComponents();
    }

    // Reset form
    document.getElementById('nameInput').value = '';
    document.getElementById('useInput').value = '';
    document.getElementById('useHint').textContent = 'Не выбрано';
    document.getElementById('docTypeInput').value = '';
    document.getElementById('docTypeInput').className = 'form-input mono optional-empty';
    document.getElementById('docTypeHint').textContent = '';
    S.selUse = null;
    S.selDocType = null;
    onCountryOrOrgChange();

    btn.textContent = '✓ Зарегистрировано';
    btn.style.background = 'var(--grn)';
    setTimeout(() => {
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Зарегистрировать номер';
      btn.style.background = '';
      updatePreview();
    }, 2500);

  } catch(e) {
    S.components = S.components.filter(c => c.id !== tempId);
    renderRegistered();
    btn.disabled = false;
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Зарегистрировать номер';
    alert('Ошибка при сохранении: ' + e.message);
  }
}

/* ═══════════════════════════════════
   INLINE EDIT
═══════════════════════════════════ */
function startEditDN(rowId) { S.editing = { rowId, mode: 'ref', selUse: null }; renderRegistered(); }
function startEditCompName(rowId) { S.editing = { rowId, mode: 'compName' }; renderRegistered(); }
function startEditUseName(rowId) { S.editing = { rowId, mode: 'useName' }; renderRegistered(); }
function cancelEdit() { S.editing = null; renderRegistered(); }

function onEditDNInput(rowId) {
  const input = document.getElementById(`editDNInput-${rowId}`);
  const q = input.value.trim().toLowerCase();
  S.editing.selUse = null;
  document.getElementById(`editSaveBtn-${rowId}`).disabled = true;

  const drop = document.getElementById(`editDNDrop-${rowId}`);
  const upCls = drop.dataset.up ? ' up' : '';
  if (!q) { drop.className = 'cell-edit-drop' + upCls; return; }

  const items = S.masterComponents.filter(r =>
    (r.decimal_number||'').toLowerCase().includes(q) || (r.name||'').toLowerCase().includes(q)
  ).slice(0, 20);

  if (!items.length) { drop.className = 'cell-edit-drop' + upCls; return; }
  drop.innerHTML = items.map((r,i) => `
    <div class="ac-item" data-idx="${i}" style="text-align:left">
      <span class="ac-code">${esc(r.decimal_number||'')}</span>
      <span class="ac-name">${esc(r.name||'')}</span>
    </div>`).join('');
  drop.querySelectorAll('.ac-item').forEach((el,i) => {
    el._rec = items[i];
    el.addEventListener('mousedown', e => e.preventDefault());
    el.addEventListener('click', () => pickEditDN(rowId, items[i]));
  });
  drop.className = 'cell-edit-drop on' + upCls;
}

function pickEditDN(rowId, rec) {
  S.editing.selUse = rec;
  document.getElementById(`editDNInput-${rowId}`).value = `${rec.decimal_number} — ${rec.name}`;
  document.getElementById(`editDNDrop-${rowId}`).className = 'cell-edit-drop';
  document.getElementById(`editSaveBtn-${rowId}`).disabled = false;
  const preview = document.getElementById(`editDNNamePreview-${rowId}`);
  if (preview) preview.textContent = rec.name || '—';
}

function onEditKey(e, rowId) {
  if (e.key === 'Escape') { cancelEdit(); return; }
  if (e.key === 'Enter') {
    if (S.editing.mode === 'ref' && S.editing.selUse) saveEditDN(rowId);
    else if (S.editing.mode === 'compName') saveEditCompName(rowId);
    else if (S.editing.mode === 'useName') saveEditUseName(rowId);
  }
}

async function saveEditDN(rowId) {
  if (!S.editing?.selUse) return;
  const newUseId = S.editing.selUse.id;
  S.editing = null;
  const idx = S.components.findIndex(c => c.id === rowId);
  if (idx >= 0) S.components[idx].primary_use = newUseId;
  renderRegistered();
  try {
    if (typeof grist !== 'undefined') {
      await grist.selectedTable.update({ id: rowId, fields: { primary_use: newUseId } });
      loadComponents();
    }
  } catch(e) { alert('Ошибка сохранения: ' + e.message); loadComponents(); }
}

async function saveEditCompName(rowId) {
  const text = (document.getElementById(`editCompNameInput-${rowId}`)?.value||'').trim();
  if (!text) return;
  S.editing = null;
  const idx = S.components.findIndex(c => c.id === rowId);
  if (idx >= 0) S.components[idx].name = text;
  renderRegistered();
  try {
    if (typeof grist !== 'undefined') {
      await grist.selectedTable.update({ id: rowId, fields: { name: text } });
      loadComponents();
    }
  } catch(e) { alert('Ошибка сохранения: ' + e.message); loadComponents(); }
}

async function saveEditUseName(rowId) {
  const text = (document.getElementById(`editUseNameInput-${rowId}`)?.value||'').trim();
  S.editing = null;
  const idx = S.components.findIndex(c => c.id === rowId);
  if (idx >= 0) S.components[idx].primary_use_name = text;
  renderRegistered();
  try {
    if (typeof grist !== 'undefined') {
      await grist.selectedTable.update({ id: rowId, fields: { primary_use_name: text } });
      loadComponents();
    }
  } catch(e) { alert('Ошибка сохранения: ' + e.message); loadComponents(); }
}

/* ═══════════════════════════════════

═══════════════════════════════════ */
function renderAcDocType(dropId, items, onPick) {
  const drop = document.getElementById(dropId);
  if (!items.length) { hideDrop(dropId); return; }
  drop.innerHTML = items.map((r,i) => `
    <div class="ac-item" data-idx="${i}">
      <span class="ac-code">${esc(String(r.code||''))}</span>
      <span class="ac-name">${esc(r.name||'')}</span>
    </div>`).join('');
  drop.querySelectorAll('.ac-item').forEach((el,i) => {
    el._rec = items[i];
    el.addEventListener('mousedown', e => e.preventDefault());
    el.addEventListener('click', () => onPick(i));
  });
  drop.className = 'ac-drop on';
}

function renderAcComponents(dropId, items, onPick) {
  const drop = document.getElementById(dropId);
  if (!items.length) { hideDrop(dropId); return; }
  drop.innerHTML = items.map((r,i) => `
    <div class="ac-item" data-idx="${i}">
      <span class="ac-code">${esc(r.decimal_number||'')}</span>
      <span class="ac-name">${esc(r.name||'')}</span>
    </div>`).join('');
  drop.querySelectorAll('.ac-item').forEach((el,i) => {
    el._rec = items[i];
    el.addEventListener('mousedown', e => e.preventDefault());
    el.addEventListener('click', () => onPick(i));
  });
  drop.className = 'ac-drop on';
}

function hideDrop(id) { const el = document.getElementById(id); if (el) el.className = 'ac-drop'; }
function getVisibleAcItems(id) { return [...document.getElementById(id).querySelectorAll('.ac-item')]; }

function acKey(e, dropId, stateObj, idxKey, onEnter) {
  const items = getVisibleAcItems(dropId);
  if (!items.length && e.key !== 'Escape') return;
  if (e.key === 'ArrowDown') { e.preventDefault(); stateObj[idxKey] = Math.min((stateObj[idxKey]||0)+1, items.length-1); highlightAc(dropId, stateObj[idxKey]); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); stateObj[idxKey] = Math.max((stateObj[idxKey]||0)-1, 0); highlightAc(dropId, stateObj[idxKey]); }
  else if (e.key === 'Enter') { e.preventDefault(); onEnter(); }
  else if (e.key === 'Escape') hideDrop(dropId);
}

function highlightAc(dropId, idx) {
  getVisibleAcItems(dropId).forEach((el,i) => el.className = 'ac-item' + (i===idx?' hov':''));
}

document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrap')) { hideDrop('docTypeDrop'); hideDrop('useDrop'); }
});

/* ═══════════════════════════════════
   UTILS
═══════════════════════════════════ */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function avatarColor(name) {
  const lc = name.trim().toLowerCase();
  if (lc === 'импорт' || lc === 'import') return '#9E9C94';
  const colors = ['#1E4ED8','#0D6E4E','#92400E','#991B1B','#5B21B6','#0369A1','#166534','#B45309','#7C3AED','#BE185D'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  return colors[Math.abs(h) % colors.length];
}

function showTooltip(el) {
  const t = document.getElementById('gTooltip');
  const text = el.getAttribute('data-tip') || '';
  if (!text) return;
  t.textContent = text;
  t.style.display = 'block';
  const r = el.getBoundingClientRect();
  const tw = t.offsetWidth, th = t.offsetHeight;
  let top = r.top - th - 8, left = r.left + r.width/2 - tw/2;
  left = Math.max(4, Math.min(left, window.innerWidth - tw - 4));
  if (top < 4) top = r.bottom + 8;
  t.style.top = top + 'px'; t.style.left = left + 'px';
}

function hideTooltip() { document.getElementById('gTooltip').style.display = 'none'; }
